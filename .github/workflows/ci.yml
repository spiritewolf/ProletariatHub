name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: proletariat
          POSTGRES_PASSWORD: proletariat
          POSTGRES_DB: proletariat_hub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U proletariat"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://proletariat:proletariat@localhost:5432/proletariat_hub
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: ci-session-secret-minimum-thirty-two-characters-long
      ENCRYPTION_KEY: ci-encryption-key-minimum-thirty-two-characters
      NODE_ENV: test
      PORT: 3000
      WEB_ORIGIN: http://localhost:5173
      VITE_API_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Prisma generate
        run: pnpm db:generate

      - name: Prisma validate
        run: pnpm --filter @proletariat-hub/database exec prisma validate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
