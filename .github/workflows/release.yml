name: Release

# ┌─────────────────────────────────────────────────────────────┐
# │  DISABLED until first stable release.                       │
# │                                                             │
# │  To enable:                                                 │
# │  1. Uncomment the 'on: push: tags:' trigger below           │
# │  2. Delete the 'on: workflow_dispatch' placeholder          │
# │  3. Commit, then tag: git tag v1.0.0 && git push origin v1.0.0  │
# └─────────────────────────────────────────────────────────────┘

# DISABLED: Uncomment to enable release on version tags:
# on:
#   push:
#     tags: ['v*.*.*']

# Placeholder — keeps GitHub from rejecting a workflow with no trigger.
# Delete this line when you enable the real trigger above.
on: workflow_dispatch

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  release:
    name: Build & Publish Images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ci

    strategy:
      matrix:
        image:
          - name: api
            dockerfile: docker/Dockerfile.api
          - name: web
            dockerfile: docker/Dockerfile.web
          - name: worker
            dockerfile: docker/Dockerfile.worker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/proletariat-hub-${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: release

    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
