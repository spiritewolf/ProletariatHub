name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Prisma generate
        run: pnpm turbo db:generate

      - uses: changesets/action@v1
        id: changesets
        with:
          version: pnpm run version-packages
          publish: pnpm run release:publish
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.changesets.outputs.published == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.changesets.outputs.published == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        if: steps.changesets.outputs.published == 'true'
        id: meta
        run: echo "version=$(node -p \"require('./apps/api/package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Build and push API
        if: steps.changesets.outputs.published == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/proletariat-hub-api:latest
            ghcr.io/${{ github.repository_owner }}/proletariat-hub-api:v${{ steps.meta.outputs.version }}

      - name: Build and push worker
        if: steps.changesets.outputs.published == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.worker
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/proletariat-hub-worker:latest
            ghcr.io/${{ github.repository_owner }}/proletariat-hub-worker:v${{ steps.meta.outputs.version }}

      - name: Build and push web
        if: steps.changesets.outputs.published == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/proletariat-hub-web:latest
            ghcr.io/${{ github.repository_owner }}/proletariat-hub-web:v${{ steps.meta.outputs.version }}
