services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: proletariat
      POSTGRES_PASSWORD: proletariat
      POSTGRES_DB: proletariat_hub
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U proletariat -d proletariat_hub']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: development
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://proletariat:proletariat@postgres:5432/proletariat_hub
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      PORT: 3000
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'sh', '/app/docker/healthcheck-api.sh']
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s
    entrypoint: ['/bin/sh', '/app/docker/entrypoint-dev.sh']
    command: ['pnpm', '--filter', '@proletariat-hub/api', 'dev']

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
      target: development
    env_file: .env
    environment:
      DATABASE_URL: postgresql://proletariat:proletariat@postgres:5432/proletariat_hub
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    volumes:
      - .:/app
      - worker_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ['/bin/sh', '/app/docker/entrypoint-dev.sh']
    command: ['pnpm', '--filter', '@proletariat-hub/worker', 'dev']

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      target: development
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_PROXY_TARGET: http://api:3000
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
    depends_on:
      api:
        condition: service_healthy
    entrypoint: ['/bin/sh', '/app/docker/entrypoint-dev.sh']
    command: ['pnpm', '--filter', '@proletariat-hub/web', 'dev']

volumes:
  pgdata:
  redisdata:
  api_node_modules:
  worker_node_modules:
  web_node_modules:
  web_app_node_modules:
